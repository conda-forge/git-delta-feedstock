schema_version: 1

context:
  name: git-delta
  version: "0.19.2"

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://github.com/dandavison/delta/archive/refs/tags/${{ version }}.tar.gz
  sha256: f59b86f8c8dda4d76a3ba34b8553777a20c3b461646917d8e480fac6531bba9f

build:
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - cargo-bundle-licenses
  host:
    - zlib

tests:
  - script:
      - delta --version

about:
  license: MIT
  license_file:
    - LICENSE.txt
    - THIRDPARTY.yml
  summary: A syntax-highlighting pager for git, diff, and grep output.
  homepage: https://github.com/dandavison/delta

extra:
  recipe-maintainers:
    - YYYasin19
    - pavelzw
